name: Auto post Singapore F&B news + Instagram

on:
  schedule:
    # 09:00 Asia/Tokyo (JST, UTC+9) = 00:00 UTC, every day.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "run"
        type: choice
        options:
          - run
          - collect
          - instagram
          - repair
      repair_slug:
        description: "Slug to repair (only for repair mode)"
        required: false
        default: ""

concurrency:
  group: auto-post
  cancel-in-progress: false

# Opt actions/checkout + actions/setup-python into the Node.js 24 runtime
# ahead of GitHub's 2026-06 forced switch (see GH changelog 2025-09-19).
# TZ pins the runner's local clock to JST (UTC+9) so log timestamps and any
# naive datetime.now() calls in auto_post.py render in Tokyo time.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: Asia/Tokyo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Run auto_post.py
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          IG_USER_ID:                ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:           ${{ secrets.IG_ACCESS_TOKEN }}
          IG_APP_ID:                 ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET:             ${{ secrets.IG_APP_SECRET }}
          SLACK_WEBHOOK_URL:         ${{ secrets.SLACK_WEBHOOK_URL }}
          NEWS_AUTHOR: Editorial Department
          MAX_NEW_ARTICLES_PER_RUN: "1"
          BRAND_LOGO_SRC: public/apple-touch-icon.png
          LOGO_OVERLAY_ENABLED: "true"
        run: |
          MODE="${{ github.event.inputs.mode || 'run' }}"
          SLUG="${{ github.event.inputs.repair_slug }}"
          if [ "$MODE" = "repair" ]; then
            if [ -z "$SLUG" ]; then
              echo "ERROR: repair mode requires repair_slug input"
              exit 1
            fi
            python python/auto_post.py repair --slug "$SLUG" -v
          else
            python python/auto_post.py "$MODE" -v
          fi
